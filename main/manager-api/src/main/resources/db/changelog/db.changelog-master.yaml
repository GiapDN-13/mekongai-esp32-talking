                  type: VARCHAR(32)
                  remarks: "Audio ID"
              - column:
                  name: created_at
                  type: datetime(3)
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP(3)
                  remarks: "Created at"
              - column:
                  name: updated_at
                  type: datetime(3)
                  constraints:
                    nullable: false
