# Conventions:
# changeSet id/author follow the existing timestamp convention; SQL filenames describe migration/seed content (not necessarily matching id).
# Prefer Liquibase declarative changes for DDL (tables, columns, indexes, drops); keep classpath .sql for heavy seeds and complex/JSON/dynamic/MySQL-specific SQL.
# Options like afterColumn are database-specific—review each changeSet when switching engines.
# Add only new changeSets when changing schema; do not edit prior changeSets or their artifacts.
