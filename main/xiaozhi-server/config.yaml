# ====================================================================================
# DEFAULT CONFIG — Do NOT edit this file directly.
# To override, create data/.config.yaml and add only the keys you want to change.
# The system loads data/.config.yaml first; missing keys fall back to this file.
# If you use the Manager API (智控台), all settings below are overridden by the API.
# ====================================================================================

# ====================================================================================
# SERVER CONFIGURATION
# ====================================================================================
server:
  # Server listening address and port
  ip: 0.0.0.0
  port: 8000
  # HTTP server port — used for OTA firmware updates and vision analysis endpoint
  http_port: 8003
  # WebSocket URL sent to device via OTA. Auto-generated if left as default.
  # For Docker or public deployment, set to your actual LAN/public address.
  websocket: ws://your-ip-or-domain:port/xiaozhi/v1/
  # Vision analysis endpoint URL sent to device.
  # Auto-generated if left as default. Override for Docker or public deployment.
  vision_explain: http://your-ip-or-domain:port/mcp/vision/explain
  # Timezone offset for OTA info
  timezone_offset: +7
  # Authentication
  auth:
    # Enable token authentication
    enabled: false
    # Whitelisted device IDs — bypass token verification
    allowed_devices:
      - "11:22:33:44:55:66"
  # MQTT gateway config — format: host:port (see mqtt_gateway .env)
  mqtt_gateway: null
  # MQTT signature key — used to generate MQTT connection password
  mqtt_signature_key: null
  # UDP gateway config
  udp_gateway: null

log:
  # Console log format (loguru) — clean, easy to scan
  log_format: "<green>{time:HH:mm:ss}</green> <level>{level: <4}</level> <cyan>{extra[tag_short]: <12}</cyan> <light-green>{message}</light-green>"
  # File log format — full details for debugging
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <5} | {extra[tag_short]: <12} | {message}"
  # Log level: INFO or DEBUG
  log_level: INFO
  # Log directory
  log_dir: tmp
  # Log filename
  log_file: "server.log"
  # Data directory
  data_dir: data

# Delete temporary audio files after use
delete_audio: true
# Disconnect after N seconds without voice input (default: 120s = 2 minutes)
close_connection_no_voice_time: 120
# TTS request timeout (seconds)
tts_timeout: 10
# Enable wakeup word response caching for faster replies
enable_wakeup_words_response_cache: true
# Greet the user when they say a wakeup word
enable_greeting: true
# Play a notification sound after TTS finishes speaking
enable_stop_tts_notify: false
# Path to the TTS completion notification sound
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Enable WebSocket ping/pong keepalive
enable_websocket_ping: false

# Voice barge-in: allow interrupting TTS by speaking (requires good AEC)
# Set to false to only allow button-based interrupt
enable_voice_barge_in: false

# Seconds to suppress mic input after TTS ends (reduces echo tail false triggers)
post_tts_cooldown_s: 0.2

# Seconds to suppress VAD after wake word detection (avoids self-trigger)
post_wakeup_suppress_s: 0.5

# TTS audio send delay config
# 0 = precise timing matching audio frame rate (default)
# > 0 = fixed delay in milliseconds (e.g. 60)
tts_audio_send_delay: 0

# Exit commands — phrases that trigger connection close
exit_commands:
  - "thoát"
  - "tắt đi"
  - "kết thúc"

# Device protocol config
xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Opus supported sample rates: [8000, 12000, 16000, 24000, 48000]
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Module test config — test sentences for performance testing
module_test:
  test_sentences:
    - "Xin chào, hãy giới thiệu về bạn"
    - "What's the weather like today?"
    - "Hãy tóm tắt nguyên lý cơ bản của tính toán lượng tử trong 100 từ"

# Wakeup words — distinguish wakeup phrases from normal speech
wakeup_words:
  - "xin chào"
  - "chào milo"
  - "milo ơi"
  - "kể chuyện đi"
  - "chào bạn"

# MCP endpoint WebSocket URL, e.g. ws://host:port/mcp/?token=...
# Guide: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/mcp-endpoint-integration.md
mcp_endpoint: your-mcp-endpoint websocket url

# Context providers — inject dynamic data into system prompt (health, weather, etc.)
context_providers:
  - url: ""
    headers:
      Authorization: ""

# ====================================================================================
# PLUGIN CONFIGURATION
# ====================================================================================
plugins:
  # Weather plugin — uses QWeather API
  # Shared key (may be rate-limited). Get your own at:
  # https://console.qweather.com/#/apps/create-key/over
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Hồ Chí Minh"

  # News plugin (ChinaNews RSS) — supports society, tech, finance
  # More RSS feeds: https://www.chinanews.com.cn/rss/
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"

  # News plugin (NewsNow aggregator)
  get_news_from_newsnow:
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "VnExpress;Tuổi Trẻ;Thanh Niên"

  # Home Assistant integration
  home_assistant:
    devices:
      - "Phòng khách,Đèn,switch.light_living_room"
      - "Phòng ngủ,Đèn bàn,switch.light_bedroom"
    base_url: http://homeassistant.local:8123
    api_key: your-home-assistant-api-token

  # Music player plugin
  play_music:
    music_dir: "./music"  # Directory to search for music files (recursive)
    music_ext:            # Supported audio formats (.p3 is most efficient)
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300     # Refresh music list interval (seconds)

  # RAGFlow knowledge base search plugin (legacy, kept for backward compatibility)
  search_from_ragflow:
    # Description helps the LLM decide when to call this tool
    description: "When the user asks about [topic], use this knowledge base to answer"
    base_url: "http://192.168.0.8"
    api_key: "ragflow-xxx"
    dataset_ids: ["123456789"]

  search_from_qdrant:
    rag_provider: "qdrant"
    description: "Tìm kiếm truyện và nội dung kể chuyện cho trẻ em trong knowledge base"

    # Qdrant connection
    url: "http://localhost:6333"
    api_key: null
    collection_name: "xiaozhi_knowledge_v2"

    # --- LightRAG (GraphRAG) --- chưa dùng cho production ---
    # working_dir: "data/lightrag_storage"
    # vector_storage: "QdrantVectorDBStorage"
    # search_mode: "hybrid"
    # llm_model: "gpt-4o-mini"
    # llm_api_key: ""
    # chunk_token_size: 1200
    # chunk_overlap_token_size: 100
    # max_gleaning: 1

    # Embedding — configured via UI "Quản lý tham số" (sys_params)
    # Values here are defaults, overridden by manager-api params
    embedding_provider: "local"
    embedding_model: "BAAI/bge-m3"
    vector_size: 1024
    bedrock_region: ""
    bedrock_access_key: ""
    bedrock_secret_key: ""
    gemini_api_key: ""
    openai_api_key: ""
    openai_base_url: ""

    # Search parameters
    search_timeout: 5
    qdrant_timeout: 5
    top_k: 5
    score_threshold: 0.2
    chunk_size: 1500
    chunk_overlap: 150

# Voiceprint recognition config
# Service: main/voiceprint-service (FastAPI + Resemblyzer)
# Start: cd main/voiceprint-service && python app.py
voiceprint:
  # Voiceprint API endpoint (format: http://host:port?key=YOUR_API_KEY)
  url: http://localhost:8100?key=voiceprint-secret-key
  # Speaker config: speaker_id, name, description
  # These speakers must be registered via POST /voiceprint/register first
  speakers:
    - "test1,Minh,Minh là lập trình viên"
    - "test2,Lan,Lan là quản lý sản phẩm"
    - "test3,Hùng,Hùng là nhà thiết kế"
  # Similarity threshold (0.0–1.0, default 0.45 for ECAPA-TDNN)
  similarity_threshold: 0.45
  # --- Speaker Gate: only respond to enrolled speakers ---
  speaker_gate_enabled: true
  # Polite rejection message for strangers
  rejection_message: "Xin lỗi, em không nhận ra giọng của bạn. Chỉ có người đã đăng ký mới sử dụng được thiết bị này nha."
  # Enrollment prompts (temporary registration for unknown voices)
  enrollment_prompt_name: "Xin chào! Em chưa nhận ra giọng của bạn. Cho em biết tên bạn nha để em đăng ký tạm thời."
  enrollment_prompt_voice: "Cảm ơn {name}! Bây giờ bạn hãy nói rõ ràng một câu dài vào mic để em ghi nhận giọng nói nha. Ví dụ: Xin chào, tôi là {name}, rất vui được gặp bạn."
  enrollment_success: "Tuyệt vời! Em đã ghi nhận giọng nói của {name} rồi. Đây là đăng ký tạm thời, nếu hệ thống khởi động lại thì bạn cần đăng ký lại nha. Bây giờ mình trò chuyện thôi!"
  enrollment_fail: "Ôi, em chưa ghi nhận được giọng nói. Bạn thử nói rõ ràng hơn một câu dài hơn nha."

# ====================================================================================
# PERSONA / PROMPT CONFIGURATION
# ====================================================================================

prompt: ""

# System prompt template file
prompt_template: storyteller-prompt.txt

# Response when system encounters an error
system_error_response: "Ôi, Milo bị trục trặc rồi. Bạn thử nói lại nhé!"

# Closing prompt — farewell message when session ends
end_prompt:
  enable: true
  prompt: |
    Hãy kết thúc cuộc trò chuyện bằng một lời tạm biệt dễ thương, nhẹ nhàng, khiến trẻ cảm thấy vui.
    Ví dụ: hẹn gặp lại, nhắc trẻ ngủ ngon, hoặc gợi ý câu chuyện ngày mai.

# ====================================================================================
# MODULE SELECTION — Choose which provider to use for each module
# ====================================================================================
selected_module:
  # Voice Activity Detection — default: SileroVAD (local)
  VAD: SileroVAD
  # Speech Recognition — options: FunASR, SherpaASR, ZipformerViASR
  ASR: ZipformerViASR
  # Language Model — options: GeminiLLM, OpenAILLM, BedrockLLM
  LLM: BedrockLLM
  # Vision Language Model
  VLLM: ChatGLMVLLM
  # Text-to-Speech — options: EdgeTTS, gTTS, FishSpeech, CustomTTS, etc.
  TTS: gTTS
  # Memory — options: nomem, mem0ai, powermem, mem_local_short
  Memory: mem_local_short
  # Intent recognition — options: nointent, intent_llm, function_call
  # function_call requires LLM with function calling support (e.g. Gemini)
  Intent: function_call

# ====================================================================================
# INTENT RECOGNITION
# ====================================================================================
# Đặt disable_tools: true để vô hiệu hoá tất cả tool calls
disable_tools: false

Intent:
  nointent:
    type: nointent

  intent_llm:
    type: intent_llm
    # Independent LLM for intent recognition (optional, defaults to selected_module.LLM)
    llm: GeminiLLM
    # Plugins to load for intent detection
    functions:
      - get_weather
      - get_news_from_newsnow
      - play_music

  function_call:
    type: function_call
    # Plugins to load — system always includes: handle_exit_intent, get_lunar
    functions:
      - change_role
      - get_weather
      - play_music
      # - get_news_from_newsnow  # Loại bỏ — phụ thuộc API bên thứ 3
      # - search_from_qdrant    # Đã chuyển sang RAG Inline (Mode B)
      # - search_from_ragflow   # Legacy RAGFlow

# ====================================================================================
# RAG CONFIGURATION (Retrieval-Augmented Generation)
# ====================================================================================
RAG:
  # RAG Inline — tự động search và inject context vào query TRƯỚC khi gọi LLM
  # Chỉ 1 LLM call, nhanh hơn function calling (~3-5s thay vì ~9-14s)
  # Embedding & search params (top_k, score_threshold, vector_size...) lấy từ plugins.search_from_qdrant
  inline:
    enabled: true
    qdrant_plugin: search_from_qdrant
    trigger_mode: "keyword"
    trigger_keywords:
      # --- Generic: sự tích / truyện cổ tích ---
      - "sự tích"
      - "su tich"
      - "truyện cổ tích"
      - "truyen co tich"
      - "kể chuyện"
      - "ke chuyen"
      - "ngày xưa"
      - "ngay xua"
      - "chuyện"
      - "chuyen"
      # --- 1. Sự tích dưa hấu (Mai An Tiêm) ---
      - "dưa hấu"
      - "dua hau"
      - "mai an tiêm"
      - "mai an tiem"
      - "an tiêm"
      - "an tiem"
      - "hùng vương"
      - "hung vuong"
      # --- 2. Sự tích trầu cau ---
      - "trầu cau"
      - "trau cau"
      - "trầu"
      - "trau"
      - "cau"
      - "vôi"
      - "voi"
      - "tân lang"
      - "tan lang"
      # --- 3. Sự tích trái sầu riêng ---
      - "sầu riêng"
      - "sau rieng"
      - "tu rên"
      - "tu ren"
      - "tây sơn"
      - "tay son"
      - "gia long"
      - "đồng nai"
      - "dong nai"
      - "chân lạp"
      - "chan lap"
      # --- 4. Sự tích cây huyết dụ ---
      - "huyết dụ"
      - "huyet du"
      - "đồ tể"
      - "do te"
      - "giết lợn"
      - "giet lon"
      - "chuông chùa"
      - "chuong chua"
      # --- 5. Sự tích chim hít cô ---
      - "hít cô"
      - "hit co"
      - "chim hít"
      - "chim hit"
      - "cô cháu"
      - "co chau"
      - "mò cua"
      - "mo cua"
      - "bắt ốc"
      - "bat oc"
      - "nồi cháo"
      - "noi chao"
      # --- 6. Sự tích chim tu hú ---
      - "tu hú"
      - "tu hu"
      - "chim tu"
      - "bất nhẫn"
      - "bat nhan"
      - "năng nhẫn"
      - "nang nhan"
      - "nhẫn nhục"
      - "nhan nhuc"
      # --- ASR misrecognition variants ---
      # Dưa hấu: sai dấu, sai phụ âm đầu, nuốt âm
      - "dưa hầu"
      - "dừa hấu"
      - "dừa hầu"
      - "dưa hậu"
      - "dưa hẫu"
      - "gưa hấu"
      - "đưa hấu"
      - "zưa hấu"
      # Trầu cau: sai dấu, nhầm phụ âm
      - "trầu câu"
      - "trâu cau"
      - "trấu cau"
      - "châu cau"
      - "trầu cao"
      - "trầu câu vôi"
      # Sầu riêng: sai dấu, nhầm nguyên âm
      - "sầu riềng"
      - "sấu riêng"
      - "xầu riêng"
      - "sâu riêng"
      - "sầu riệng"
      - "sầu riên"
      - "sau riêng"
      - "xâu riêng"
      # Tu hú: sai dấu, nhầm thanh
      - "tu hụ"
      - "tu hủ"
      - "tù hú"
      - "từ hú"
      - "tú hú"
      - "thu hú"
      # Hít cô: sai dấu, nhầm phụ âm
      - "hít co"
      - "hịt cô"
      - "hít cồ"
      - "hít cố"
      - "hịt co"
      - "hích cô"
      # Huyết dụ: sai dấu, nuốt âm
      - "huyết dủ"
      - "huyết du"
      - "huyệt dụ"
      - "huyết dự"
      - "huyết đụ"
      - "huết dụ"
      # Mai An Tiêm: sai dấu, nuốt âm
      - "mai an tiềm"
      - "mai an tiệm"
      - "mai an tiễm"
      - "mái an tiêm"
      - "mai anh tiêm"
      # Sự tích: sai dấu
      - "sự tịch"
      - "sừ tích"
      - "sự tich"
      - "sư tích"
      # Kể chuyện: sai dấu, nhầm phụ âm
      - "kế chuyện"
      - "kể chuyền"
      - "kễ chuyện"
      - "kề chuyện"
      # Tân Lang: sai dấu
      - "tân lăng"
      - "tấn lang"
      - "tần lang"
      # Bất Nhẫn / Năng Nhẫn: sai dấu
      - "bất nhẩn"
      - "bấn nhẫn"
      - "bật nhẫn"
      - "năng nhẩn"
      - "nắng nhẫn"
      # Cổ tích: common variant
      - "cổ tích"
      - "co tich"
    inject_position: "user_message"
    score_threshold: 0.30
    max_chunks: 3
    context_template: |
      [DỮ LIỆU TỪ KNOWLEDGE BASE]
      {context}
      [HẾT DỮ LIỆU KNOWLEDGE BASE]
      HƯỚNG DẪN:
      1. Người dùng NÓI qua microphone, ASR thường sai dấu/phụ âm tiếng Việt.
         Ví dụ: "sầu riềng" = "sầu riêng", "dưa hầu" = "dưa hấu", "tu hụ" = "tu hú", "trầu câu" = "trầu cau".
         Đối chiếu với tên truyện trong KB để suy luận ý định.
      2. Nếu câu hỏi LIÊN QUAN đến nội dung knowledge base → kể chuyện / trả lời dựa trên dữ liệu, KHÔNG bịa.
      3. Nếu câu hỏi KHÔNG liên quan (thời tiết, tin tức, nhạc, giờ giấc...) → bỏ qua KB, trả lời bình thường.

# ====================================================================================
# MEMORY MODULE
# ====================================================================================
Memory:
  nomem:
    type: nomem

  mem0ai:
    type: mem0ai
    # Get API key at: https://app.mem0.ai/dashboard/api-keys
    # 1000 free calls/month
    api_key: your-mem0ai-api-key

  powermem:
    # PowerMem by OceanBase — agent memory with local LLM summarization
    # GitHub: https://github.com/oceanbase/powermem
    # Cost: free with sqlite + free LLM; cloud LLM/DB costs extra
    type: powermem
    # Enable user profile extraction (requires powermem 0.3.0+)
    enable_user_profile: true
    # LLM config for memory summarization
    llm:
      provider: openai
      config:
        api_key: your-llm-api-key
        model: qwen-plus
    # Embedding model config
    embedder:
      provider: openai
      config:
        api_key: your-embedding-api-key
        model: text-embedding-v4
        openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # Vector store — options: sqlite (lightweight), oceanbase (recommended), postgres
    vector_store:
      provider: sqlite
      config: {}

  mem_local_short:
    # Local memory — LLM summarizes conversations, data stored on local server
    type: mem_local_short
    # Independent LLM for summarization (optional, defaults to selected_module.LLM)
    llm: BedrockLLM

  mem0_local:
    # Long-term memory — Mem0 OSS self-hosted + Qdrant vector store
    # Bedrock credentials configured via UI "Quản lý tham số" (memory.bedrock_*)
    type: mem0_local
    vector_store:
      provider: qdrant
      config:
        host: localhost
        port: 6333
        collection_name: xiaozhi_memory_v2
    embedder:
      provider: aws_bedrock
      config:
        model: amazon.titan-embed-text-v2:0
        aws_access_key_id: ""
        aws_secret_access_key: ""
        aws_region: ""
    llm:
      provider: aws_bedrock
      config:
        model: anthropic.claude-3-5-haiku-20241022-v1:0
        aws_access_key_id: ""
        aws_secret_access_key: ""
        aws_region: us-east-1

# ====================================================================================
# ASR (Speech Recognition)
# ====================================================================================
ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/

  SherpaASR:
    # Sherpa-ONNX local ASR (requires manual model download)
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17
    output_dir: tmp/
    # Model type: sense_voice (multilingual) or paraformer (Chinese-only)
    model_type: sense_voice

  SherpaParaformerASR:
    # Chinese ASR model for low-spec devices (e.g. RK3566-2G)
    # See: docs/sherpa-paraformer-guide.md
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-paraformer-zh-small-2024-03-09
    output_dir: tmp/
    model_type: paraformer

  ZipformerViASR:
    # Vietnamese Zipformer RNNT (~30M params, 6000h training data, VLSP 2025 winner)
    # https://huggingface.co/hynt/Zipformer-30M-RNNT-6000h
    # License: CC BY-NC-ND 4.0
    type: zipformer_vi
    model_dir: models/Zipformer-30M-RNNT-6000h
    output_dir: tmp/

# ====================================================================================
# VAD (Voice Activity Detection)
# ====================================================================================
VAD:
  SileroVAD:
    type: silero
    threshold: 0.7
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    # Increase this if the speaker pauses frequently between words
    min_silence_duration_ms: 200

# ====================================================================================
# LLM (Large Language Model)
# ====================================================================================
LLM:
  GeminiLLM:
    type: gemini
    # Get API key at: https://aistudio.google.com/apikey
    # If behind a firewall, configure http_proxy/https_proxy
    api_key: ""
    model_name: "gemini-2.5-flash"
    http_proxy: ""
    https_proxy: ""

  OpenAILLM:
    type: openai
    # Get API key at: https://platform.openai.com/api-keys
    # Models: gpt-4o, gpt-4o-mini, gpt-4-turbo, gpt-3.5-turbo
    model_name: "gpt-4.1-mini"
    base_url: "https://api.openai.com/v1"
    api_key: ""
    max_tokens: 600
    temperature: 0.3

  BedrockLLM:
    type: bedrock
    # AWS Bedrock model ID — examples:
    # anthropic.claude-3-5-sonnet-20241022-v2:0, anthropic.claude-3-haiku-20240307-v1:0
    # amazon.nova-pro-v1:0, amazon.nova-lite-v1:0
    model_id: "us.anthropic.claude-opus-4-6-v1"
    region: "us-east-1"
    # AWS credentials (leave empty to use env vars or IAM role)
    aws_access_key_id: ""
    aws_secret_access_key: ""
    max_tokens: 600
    temperature: 0.3

# ====================================================================================
# VLLM (Vision Language Model)
# ====================================================================================
VLLM:
  ChatGLMVLLM:
    type: openai
    # ChatGLM free vision model — get API key at:
    # https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    model_name: glm-4v-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your-api-key

# ====================================================================================
# TTS (Text-to-Speech)
# Only relevant providers are kept. Chinese-market-only services have been removed.
# ====================================================================================
TTS:
  # --- gTTS (Google Text-to-Speech, free, no API key needed) ---
  gTTS:
    type: gtts
    language: "vi"
    tld: "com.vn"
    slow: false
    output_dir: tmp/

  # --- Edge TTS (Microsoft, free, no API key needed) ---
  EdgeTTS:
    type: edge
    # vi-VN-HoaiMyNeural: warm female voice, suitable for storytelling
    voice: vi-VN-HoaiMyNeural
    output_dir: tmp/
    language: "Tiếng Việt"

  # --- OpenAI TTS (streaming, gpt-4o-mini-tts) ---
  OpenAITTS:
    type: openai
    api_key: "your-openai-api-key"
    api_url: "https://api.openai.com/v1/audio/speech"
    model: "gpt-4o-mini-tts"
    voice: "shimmer"
    format: "pcm"
    speed: 0.9
    instructions: >-
      You are Milo, a beloved children's storyteller — like a YouTube Kids narrator
      who captivates children aged 5 to 10. Speak entirely in Vietnamese.
      You do not just narrate — you PERFORM. Like a voice actor in an animated movie.

      VOICE CHARACTER:
      Sound like a favorite older sibling at bedtime. Warm, playful, full of wonder.
      Your voice should make children lean in and listen. Never robotic, never flat,
      never like a teacher reading from a textbook.

      EXPRESSIVE SPEECH — CRITICAL:
      The text contains elongated sounds that indicate emotional delivery.
      You MUST read them with the intended emotion, not as spelling errors:
      - khôngggg, đâuuu, nhaaa = whiny, pleading, cute — stretch the final sound
      - Ơơơ?, Hảaa?, Gìii? = surprised — rising pitch, stretched vowel
      - Yayyy!, Huraaa!, Wowww! = excited — high energy, joyful burst
      - Huhuuu, Ớớớ = scared or worried — soft, trembling
      - Ôiii, Saooo = wistful, emotional — gentle, drawn out
      - Suỵt, nè nè = whispered, secretive — very soft and close
      - haha, hihi, hehe = natural laughter — light and genuine
      These are NOT typos. They are emotional cues. Honor every single one.

      STORYTELLING RHYTHM:
      Read each short sentence clearly, then pause.
      Three dots mean a real pause — hold it for half a second.
      Line breaks mean a micro-pause — honor every single one.
      Speed up during exciting chase scenes or surprises.
      Slow down and soften for emotional or cozy moments.
      Whisper gently when sharing secrets or building mystery.
      Let silence build anticipation before a reveal.

      CHARACTER VOICES:
      When reading character dialogue, shift your tone slightly.
      A shy robot speaks softly and hesitantly.
      A brave character speaks with more confidence.
      A scared character has a trembling, higher voice.
      A happy character has bright, bouncy energy.
      Make each character feel distinct but gentle.

      EMOTIONAL RANGE (like a pro voice actor):
      Default: warm, curious, gentle — like sharing a wonderful secret.
      Excitement: voice lifts with genuine delight.
      Suspense: lower voice, slower pace, dramatic pauses.
      Questions to the child: playful, inviting, like a game.
      Happy endings: warm smile in your voice, cozy and satisfied.
      Cliffhangers: rising intonation, leave them wanting more.

      VIETNAMESE PRONUNCIATION:
      Pronounce all 6 tones clearly but gently.
      Let Vietnamese melody create a soothing, musical storytelling quality.
      Natural fillers like nè, à, ừm should sound warm, not mechanical.

      CRITICAL PACING RULES:
      Sentences are short — under 15 words. Read each one as its own beat.
      Never rush. Children need time to imagine what they hear.
      After each emotional beat, breathe naturally.
      The rhythm should feel like a heartbeat — steady, warm, alive.
    output_dir: tmp/
    language: "Tiếng Việt"

  # --- Fish Speech (self-hosted, supports voice cloning) ---
  FishSpeech:
    # Setup guide: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/fish-speech-integration.md
    type: fishspeech
    output_dir: tmp/
    response_format: wav
    reference_id: null
    reference_audio: ["config/assets/wakeup_words.wav"]
    reference_text: ["Xin chào, tôi là MekongAI, rất vui được gặp bạn!"]
    normalize: true
    max_new_tokens: 1024
    chunk_length: 200
    top_p: 0.7
    repetition_penalty: 1.2
    temperature: 0.7
    streaming: false
    use_memory_cache: "on"
    seed: null
    channels: 1
    rate: 44100
    api_key: "your-api-key"
    api_url: "http://127.0.0.1:8080/v1/tts"
    # language: "Tiếng Việt"

  # --- GPT-SoVITS v2 (self-hosted, multilingual) ---
  GPT_SOVITS_V2:
    # Start: python api_v2.py -a 127.0.0.1 -p 9880 -c GPT_SoVITS/configs/demo.yaml
    type: gpt_sovits_v2
    url: "http://127.0.0.1:9880/tts"
    output_dir: tmp/
    text_lang: "auto"
    ref_audio_path: "demo.wav"
    prompt_text: ""
    prompt_lang: "zh"
    top_k: 5
    top_p: 1
    temperature: 1
    text_split_method: "cut0"
    batch_size: 1
    batch_threshold: 0.75
    split_bucket: true
    return_fragment: false
    speed_factor: 1.0
    streaming_mode: false
    seed: -1
    parallel_infer: true
    repetition_penalty: 1.35
    aux_ref_audio_paths: []
    # language: "Tiếng Việt"

  # --- GPT-SoVITS v3 (self-hosted, newer version) ---
  GPT_SOVITS_V3:
    # Start: python api.py
    type: gpt_sovits_v3
    url: "http://127.0.0.1:9880"
    output_dir: tmp/
    text_language: "auto"
    refer_wav_path: "reference.wav"
    prompt_language: "vi"
    prompt_text: ""
    top_k: 15
    top_p: 1.0
    temperature: 1.0
    cut_punc: ""
    speed: 1.0
    inp_refs: []
    sample_steps: 32
    if_sr: false
    # language: "Tiếng Việt"

  # --- Custom TTS (flexible HTTP endpoint, e.g. KokoroTTS) ---
  CustomTTS:
    # Generic POST endpoint that returns audio. Adapt params for your service.
    # Example: KokoroTTS Docker
    #   CPU:  docker run -p 8880:8880 ghcr.io/remsky/kokoro-fastapi-cpu:latest
    #   GPU:  docker run --gpus all -p 8880:8880 ghcr.io/remsky/kokoro-fastapi-gpu:latest
    type: custom
    method: POST
    url: "http://127.0.0.1:8880/v1/audio/speech"
    params:
      input: "{prompt_text}"
      response_format: "mp3"
      download_format: "mp3"
      voice: "zf_xiaoxiao"
      lang_code: "z"
      return_download_link: true
      speed: 1
      stream: false
    headers: {}
    format: mp3
    output_dir: tmp/
    # language: "Tiếng Việt"

  # --- PaddleSpeech (self-hosted, Baidu PaddlePaddle) ---
  PaddleSpeechTTS:
    # GitHub: https://github.com/PaddlePaddle/PaddleSpeech
    # WebSocket streaming: https://github.com/PaddlePaddle/PaddleSpeech/wiki/PaddleSpeech-Server-WebSocket-API
    type: paddle_speech
    protocol: websocket
    url: ws://127.0.0.1:8092/paddlespeech/tts/streaming
    spk_id: 0          # Speaker ID (0 = default)
    speed: 1.0          # Speech speed (>1 faster, <1 slower)
    volume: 1.0         # Volume (>1 louder, <1 quieter)
    save_path:
    # language: "Tiếng Việt"
