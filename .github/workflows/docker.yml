name: Docker Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-server:
    name: Build xiaozhi-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build xiaozhi-server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-server
          push: false
          tags: xiaozhi-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build manager-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-web
          push: false
          tags: xiaozhi-web:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
