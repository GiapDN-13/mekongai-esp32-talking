name: Tests

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Python xiaozhi-server tests ───────────────────────────────────
  python-tests:
    name: Python Tests (xiaozhi-server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main/xiaozhi-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: main/xiaozhi-server/requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov \
                      portalocker Jinja2 loguru requests \
                      ruamel.yaml pyyml numpy httpx aiohttp \
                      openai pydub ormsgpack silero_vad \
                      opuslib_next sherpa_onnx cnlunar

      - name: Create minimal config for tests
        run: |
          mkdir -p data
          echo -e "log:\n  log_dir: tmp\n  data_dir: data" > data/.config.yaml

      - name: Run tests with coverage
        env:
          XIAOZHI_LOCAL_CONFIG_ONLY: "1"
        run: pytest --cov=core --cov=plugins_func --cov-report=xml --cov-report=term -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: main/xiaozhi-server/coverage.xml

  # ─── Frontend manager-web tests ────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (manager-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main/manager-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: main/manager-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npx jest --verbose --ci

  # ─── Java manager-api tests ────────────────────────────────────────
  java-tests:
    name: Java Tests (manager-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main/manager-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests (skip integration tests)
        run: >
          mvn test
          -DskipTests=false
          -Dtest="PasswordUtilsTest,Sm2DecryptUtilTest,AESUtilsTest"
          -Dsurefire.failIfNoSpecifiedTests=false
          -pl .
          --batch-mode
          --no-transfer-progress
